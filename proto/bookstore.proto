syntax = "proto3";

package bookstore;

option go_package = "./proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ----- 枚举 -----
enum BookCategory {
  BOOK_CATEGORY_UNSPECIFIED = 0;
  BOOK_CATEGORY_FICTION = 1; // 小说
  BOOK_CATEGORY_NONFICTION = 2; //非虚构
  BOOK_CATEGORY_TECHNICAL = 3; // 技术
  BOOK_CATEGORY_SCIENCE = 4; //科学
}

// ----- 消息体 ------

// 书籍
message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  BookCategory category = 4;
  int64 price_cents = 5; // 价格(分)
  int32 stock = 6; //库存
  repeated string tags = 7; // 标签切片
  google.protobuf.Timestamp published_at = 8;
  map<string, string> metadata = 9; // 扩展信息
}

// ----- 请求/响应 -----

// 创建书籍
message CreateBookRequest {
  string title = 1;
  string author = 2;
  BookCategory category = 3;
  int64 price_cents = 4;
  int32 stock = 5;
  repeated string tags = 6;
}
message CreateBookResponse {
  Book book = 1;
  string message = 2;
}

// 查询书籍
message GetBookRequest {
  string id = 1;
}
message GetBookResponse {
  Book book = 1;
}

// 列出书籍
message ListBooksRequest {
  BookCategory category = 1;  // 按分类筛选
  int32 page = 2;       // 页码
  int32 page_size = 3;  // 页码数量
}
message ListBooksResponse {
  repeated Book books = 1;
  int32 total = 2;
}

// 更新书籍库存
message UpdateStockRequest {
  string book_id = 1;
  int32 quantity_change = 2;    // 正数=入库,负数=出库
}
message UpdateStockResponse {
  Book book = 1;
  string message = 2;
}

// 删除书籍
message DeleteBookRequest {
  string id = 1;
}

// 检索书籍
message SearchBooksRequest {
  string keyword = 1;
}
message SearchBooksResponse {
  repeated Book books = 1;
  int32 total = 2;
}

// 借书 / 还书

// 借书请求
message BorrowBookRequest {
  string book_id = 1;
  int32 quantity = 2;
}

// 借书响应
message BorrowBookResponse {
  Book book = 1;      // 借书之后的书籍信息(库存已更新)
  string message = 2; // 提示信息
}

// 还书请求
message ReturnBookRequest {
  string book_id = 1;     // 要还书的 ID
  int32 quantity = 2;     // 还几本(默认 1)
}

// 还书响应
message ReturnBookResponse {
  Book book = 1;          // 还完之后的书籍信息(库存已更新)
  string message = 2;     // 提示信息
}




// ----- 服务定义 -----
service Bookstore {
  rpc CreateBook(CreateBookRequest) returns (CreateBookResponse);
  rpc GetBook(GetBookRequest) returns (GetBookResponse);
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc UpdateStock(UpdateStockRequest) returns (UpdateStockResponse);
  rpc DeleteBook(DeleteBookRequest) returns (google.protobuf.Empty);
  rpc SearchBooks(SearchBooksRequest) returns (SearchBooksResponse);
  rpc BorrowBook(BorrowBookRequest) returns (BorrowBookResponse);
  rpc ReturnBook(ReturnBookRequest) returns (ReturnBookResponse);
}
